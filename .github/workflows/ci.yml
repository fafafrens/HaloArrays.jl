name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - unit tests
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.12']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          HALOARRAYS_RUN_UNIT_TESTS: "true"
          HALOARRAYS_RUN_MPI_TESTS: "false"

  mpitests:
    name: MPI tests (${{ matrix.np }} ranks)
    strategy:
      fail-fast: false
      matrix:
        np: [2, 4]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Configure MPI provider
        shell: julia --color=yes --project=. {0}
        run: |
          using Pkg
          Pkg.add("MPIPreferences")
          using MPIPreferences
          MPIPreferences.use_jll_binary("MPICH_jll")
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run MPI tests
        shell: julia --color=yes --project=. {0}
        env:
          HALOARRAYS_RUN_UNIT_TESTS: "false"
          NP: ${{ matrix.np }}
        run: |
          using MPI
          n = parse(Int, ENV["NP"])
          cmd = `$(MPI.mpiexec()) -n $n $(Base.julia_cmd()) --project=. test/runtests.jl`
          println(cmd)
          run(cmd)

name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - unit tests
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          HALOARRAYS_RUN_UNIT_TESTS: "true"
          HALOARRAYS_RUN_MPI_TESTS: "false"

  threadedtests:
    name: Threaded tests (${{ matrix.threads }} threads)
    strategy:
      fail-fast: false
      matrix:
        threads: [2, 4]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      # Runs the unit suite multithreaded so the ThreadBackend trait, the
      # threaded reductions, and the Polyester extension are exercised in CI.
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: ${{ matrix.threads }}
          HALOARRAYS_RUN_UNIT_TESTS: "true"
          HALOARRAYS_RUN_MPI_TESTS: "false"

  exampletests:
    name: Example smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      # Runs every CPU example's full driver in a throwaway module so a runtime
      # regression in an example fails CI instead of rotting silently. Threaded
      # so the threaded examples exercise more than one tile.
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: "2"
          HALOARRAYS_RUN_UNIT_TESTS: "false"
          HALOARRAYS_RUN_MPI_TESTS: "false"
          HALOARRAYS_RUN_EXAMPLE_TESTS: "true"

  mpitests:
    name: MPI tests (${{ matrix.np }} ranks)
    strategy:
      fail-fast: false
      matrix:
        np: [2, 4]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Configure MPI provider
        shell: julia --color=yes --project=. {0}
        run: |
          using Pkg
          # HDF5 is a weakdep; promote it to a dep in this throwaway CI checkout so the
          # mpiexec run (julia --project=.) can `using HDF5` and exercise the collective
          # parallel-HDF5 path in test_saving_hdf5.jl. The HaloArraysHDF5Ext extension
          # still activates (its trigger is now a regular dep).
          # OrdinaryDiffEq/LinearSolve/Krylov likewise: without them the runtests gate
          # silently SKIPS test_mpi_implicit.jl (the FBDF + HaloKrylov regression test),
          # which is exactly how the Diagonal-preconditioner scalar-indexing bug slipped
          # past CI while every job stayed green.
          Pkg.add(["MPIPreferences", "HDF5", "OrdinaryDiffEq", "LinearSolve", "Krylov"])
          using MPIPreferences
          MPIPreferences.use_jll_binary("MPICH_jll")
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run MPI tests
        shell: julia --color=yes --project=. {0}
        env:
          HALOARRAYS_RUN_UNIT_TESTS: "false"
          NP: ${{ matrix.np }}
        run: |
          using MPI
          n = parse(Int, ENV["NP"])
          cmd = `$(MPI.mpiexec()) -n $n $(Base.julia_cmd()) --project=. test/runtests.jl`
          println(cmd)
          run(cmd)
